name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - k8s/deployment.yaml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest -v --cov=app --cov-fail-under=70

  build-and-update-manifest:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/graylee0128/0717-cicd-demo:${{ github.sha }}
            ghcr.io/graylee0128/0717-cicd-demo:latest

      - name: Update GitOps image tag
        run: |
          sed -i "s|image: ghcr.io/graylee0128/0717-cicd-demo:.*|image: ghcr.io/graylee0128/0717-cicd-demo:${{ github.sha }}|" k8s/deployment.yaml
          git config user.name github-actions
          git config user.email actions@github.com
          git add k8s/deployment.yaml
          git commit -m "chore: deploy ${{ github.sha }} [skip ci]"
          git push
